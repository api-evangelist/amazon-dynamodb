  schemas:
    core:
    - name: AttributeValue
      description: >-
        Represents the data for an attribute. Each attribute value is
        described as a name-value pair with the data type as the name.
    - name: KeySchemaElement
      description: Represents a single element of a key schema
    - name: AttributeDefinition
      description: Represents an attribute for describing the schema for a table or index
    - name: ProvisionedThroughput
      description: Represents the provisioned throughput settings for a table or index
    - name: ProvisionedThroughputDescription
      description: Describes the provisioned throughput settings for a table or index
    - name: GlobalSecondaryIndex
      description: Represents the properties of a global secondary index
    - name: LocalSecondaryIndex
      description: Represents the properties of a local secondary index
    - name: Projection
      description: Represents attributes that are copied from the table into an index
    - name: TableDescription
      description: Represents the properties of a DynamoDB table
