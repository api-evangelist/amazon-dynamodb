naftiko: "1.0.0-alpha1"

info:
  label: "Amazon DynamoDB"
  description: "Amazon DynamoDB serverless NoSQL database service."
  tags:
    - Amazon DynamoDB
    - AWS
    - Database
    - NoSQL
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY

capability:
  consumes:
    - type: http
      namespace: dynamodb
      baseUri: https://dynamodb.amazonaws.com
      description: "Amazon DynamoDB serverless NoSQL database service."
      authentication:
        type: apikey
        key: Authorization
        value: "AWS4-HMAC-SHA256 Credential={{env.AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: root
          path: /
          description: "Operations for root resources."
          operations:
            - name: createTable
              method: POST
              description: "Amazon DynamoDB Create a DynamoDB Table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #DescribeTable
          path: /#DescribeTable
          description: "Operations for #DescribeTable resources."
          operations:
            - name: describeTable
              method: POST
              description: "Amazon DynamoDB Describe a DynamoDB Table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #ListTables
          path: /#ListTables
          description: "Operations for #ListTables resources."
          operations:
            - name: listTables
              method: POST
              description: "Amazon DynamoDB List DynamoDB Tables"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #UpdateTable
          path: /#UpdateTable
          description: "Operations for #UpdateTable resources."
          operations:
            - name: updateTable
              method: POST
              description: "Amazon DynamoDB Update a DynamoDB Table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #DeleteTable
          path: /#DeleteTable
          description: "Operations for #DeleteTable resources."
          operations:
            - name: deleteTable
              method: POST
              description: "Amazon DynamoDB Delete a DynamoDB Table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #PutItem
          path: /#PutItem
          description: "Operations for #PutItem resources."
          operations:
            - name: putItem
              method: POST
              description: "Amazon DynamoDB Put an Item Into a Table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #GetItem
          path: /#GetItem
          description: "Operations for #GetItem resources."
          operations:
            - name: getItem
              method: POST
              description: "Amazon DynamoDB Get an Item from a Table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #UpdateItem
          path: /#UpdateItem
          description: "Operations for #UpdateItem resources."
          operations:
            - name: updateItem
              method: POST
              description: "Amazon DynamoDB Update an Item in a Table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #DeleteItem
          path: /#DeleteItem
          description: "Operations for #DeleteItem resources."
          operations:
            - name: deleteItem
              method: POST
              description: "Amazon DynamoDB Delete an Item from a Table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #Query
          path: /#Query
          description: "Operations for #Query resources."
          operations:
            - name: query
              method: POST
              description: "Amazon DynamoDB Query Items in a Table or Index"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #Scan
          path: /#Scan
          description: "Operations for #Scan resources."
          operations:
            - name: scan
              method: POST
              description: "Amazon DynamoDB Scan Items in a Table or Index"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #BatchGetItem
          path: /#BatchGetItem
          description: "Operations for #BatchGetItem resources."
          operations:
            - name: batchGetItem
              method: POST
              description: "Amazon DynamoDB Get Multiple Items from One or More Tables"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #BatchWriteItem
          path: /#BatchWriteItem
          description: "Operations for #BatchWriteItem resources."
          operations:
            - name: batchWriteItem
              method: POST
              description: "Amazon DynamoDB Put or Delete Multiple Items in One or More Tables"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #TransactGetItems
          path: /#TransactGetItems
          description: "Operations for #TransactGetItems resources."
          operations:
            - name: transactGetItems
              method: POST
              description: "Amazon DynamoDB Get Items in a Transaction"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: #TransactWriteItems
          path: /#TransactWriteItems
          description: "Operations for #TransactWriteItems resources."
          operations:
            - name: transactWriteItems
              method: POST
              description: "Amazon DynamoDB Write Items in a Transaction"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
