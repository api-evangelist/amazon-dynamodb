naftiko: "1.0.0-alpha1"

info:
  label: "Amazon DynamoDB NoSQL Database Operations"
  description: "Unified capability for managing DynamoDB tables, items, queries, and transactions for application developers and data engineers."
  tags:
    - Amazon DynamoDB
    - AWS
    - Database
    - NoSQL
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY

capability:
  consumes:
    - import: dynamodb
      location: ./shared/dynamodb.yaml

  exposes:
    - type: rest
      port: 8081
      namespace: dynamodb-api
      description: "Unified REST API for NoSQL Database Operations."
      resources:
        - path: /v1/resource
          name: createTable
          description: "Amazon DynamoDB Create a DynamoDB Table"
          operations:
            - method: POST
              name: createTable
              description: "Amazon DynamoDB Create a DynamoDB Table"
              call: "dynamodb.createTable"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#DescribeTable
          name: describeTable
          description: "Amazon DynamoDB Describe a DynamoDB Table"
          operations:
            - method: POST
              name: describeTable
              description: "Amazon DynamoDB Describe a DynamoDB Table"
              call: "dynamodb.describeTable"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#ListTables
          name: listTables
          description: "Amazon DynamoDB List DynamoDB Tables"
          operations:
            - method: POST
              name: listTables
              description: "Amazon DynamoDB List DynamoDB Tables"
              call: "dynamodb.listTables"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#UpdateTable
          name: updateTable
          description: "Amazon DynamoDB Update a DynamoDB Table"
          operations:
            - method: POST
              name: updateTable
              description: "Amazon DynamoDB Update a DynamoDB Table"
              call: "dynamodb.updateTable"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#DeleteTable
          name: deleteTable
          description: "Amazon DynamoDB Delete a DynamoDB Table"
          operations:
            - method: POST
              name: deleteTable
              description: "Amazon DynamoDB Delete a DynamoDB Table"
              call: "dynamodb.deleteTable"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#PutItem
          name: putItem
          description: "Amazon DynamoDB Put an Item Into a Table"
          operations:
            - method: POST
              name: putItem
              description: "Amazon DynamoDB Put an Item Into a Table"
              call: "dynamodb.putItem"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#GetItem
          name: getItem
          description: "Amazon DynamoDB Get an Item from a Table"
          operations:
            - method: POST
              name: getItem
              description: "Amazon DynamoDB Get an Item from a Table"
              call: "dynamodb.getItem"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#UpdateItem
          name: updateItem
          description: "Amazon DynamoDB Update an Item in a Table"
          operations:
            - method: POST
              name: updateItem
              description: "Amazon DynamoDB Update an Item in a Table"
              call: "dynamodb.updateItem"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#DeleteItem
          name: deleteItem
          description: "Amazon DynamoDB Delete an Item from a Table"
          operations:
            - method: POST
              name: deleteItem
              description: "Amazon DynamoDB Delete an Item from a Table"
              call: "dynamodb.deleteItem"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/#Query
          name: query
          description: "Amazon DynamoDB Query Items in a Table or Index"
          operations:
            - method: POST
              name: query
              description: "Amazon DynamoDB Query Items in a Table or Index"
              call: "dynamodb.query"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9091
      namespace: dynamodb-mcp
      transport: http
      description: "MCP server for AI-assisted NoSQL Database Operations."
      tools:
        - name: create-table
          description: "Amazon DynamoDB Create a DynamoDB Table"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.createTable"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-table
          description: "Amazon DynamoDB Describe a DynamoDB Table"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.describeTable"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tables
          description: "Amazon DynamoDB List DynamoDB Tables"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.listTables"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-table
          description: "Amazon DynamoDB Update a DynamoDB Table"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.updateTable"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-table
          description: "Amazon DynamoDB Delete a DynamoDB Table"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.deleteTable"
          outputParameters:
            - type: object
              mapping: "$."
        - name: put-item
          description: "Amazon DynamoDB Put an Item Into a Table"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.putItem"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-item
          description: "Amazon DynamoDB Get an Item from a Table"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.getItem"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-item
          description: "Amazon DynamoDB Update an Item in a Table"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.updateItem"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-item
          description: "Amazon DynamoDB Delete an Item from a Table"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.deleteItem"
          outputParameters:
            - type: object
              mapping: "$."
        - name: query
          description: "Amazon DynamoDB Query Items in a Table or Index"
          hints:
            readOnly: false
            destructive: false
          call: "dynamodb.query"
          outputParameters:
            - type: object
              mapping: "$."
